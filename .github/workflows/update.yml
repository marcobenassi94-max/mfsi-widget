name: MFSI Daily Update
on:
  schedule:
    - cron: '0 19 * * 1-5'
  workflow_dispatch:
jobs:
  update-mfsi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance
      - run: python mfsi_updater.py
      - run: |
          git config user.email "mfsi-bot@noreply.github.com"
          git config user.name "MFSI Bot"
          git add data.json
          git commit -m "MFSI update $(date +'%Y-%m-%d')" || echo "Nessuna modifica"
          git push
